# Nginx load balancer configuration for NBA Stats Predictor
# Routes traffic across multiple Streamlit instances with session affinity

# Rate limiting zone: 10 requests/second per client IP, 10MB shared memory
limit_req_zone $binary_remote_addr zone=app_limit:10m rate=10r/s;

# Map the Upgrade header to determine connection type
# WebSocket requests get "upgrade", regular HTTP requests get "close"
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream nba_backends {
    ip_hash;

    server nba-app-1:8501 max_fails=3 fail_timeout=30s;
    server nba-app-2:8501 max_fails=3 fail_timeout=30s;
    server nba-app-3:8501 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;

    # Hide nginx version in response headers
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: ws:; font-src 'self' data:;" always;

    # Rate limit status code
    limit_req_status 429;

    # Main location block for all Streamlit traffic
    location / {
        # Rate limiting: allow burst of 20 requests without delay
        limit_req zone=app_limit burst=20 nodelay;
        proxy_pass http://nba_backends;

        # Required for WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Forward client information to backends
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts: 24 hours for long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Fast connection timeout to detect dead backends quickly
        proxy_connect_timeout 5s;

        # Buffering settings for Streamlit's streaming responses
        proxy_buffering off;
        proxy_cache off;
    }

    # Streamlit health check endpoint (proxied)
    location /_stcore/health {
        proxy_pass http://nba_backends/_stcore/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Health checks skip rate limiting (no limit_req directive here)
    }

    # Nginx health check endpoint (local, no upstream dependency)
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Custom error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
